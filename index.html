<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control de Tareas</title>

    <!-- 🔗 Conexión con el archivo CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Registro de Tareas</h2>

<form action="guardar.php" method="POST">

    <input type="text" name="nombre_tarea" placeholder="Nombre de la tarea" required><br>

    <input type="text" name="responsable" placeholder="Responsable" required><br>

    <input type="date" name="fecha_inicio"><br>

    <input type="date" name="fecha_fin"><br>

    <select name="estado">
        <option>Pendiente</option>
        <option>En proceso</option>
        <option>Finalizada</option>
    </select><br>

    <textarea name="descripcion" placeholder="Descripción"></textarea><br>

    <button type="submit">Guardar</button>

</form>

</body>
</html>
